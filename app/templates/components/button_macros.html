{% macro star_button(href, label) -%}
<a href="{{ href }}" class="group relative inline-flex items-center justify-center overflow-hidden rounded-full border border-accent/30 bg-accent px-7 py-3.5 text-sm font-semibold text-black transition-all duration-300 hover:scale-105 hover:brightness-110" style="box-shadow: 0 0 30px rgba(255,140,80,0.2);">
    <span aria-hidden="true" class="absolute inset-y-0 left-0 w-20 -translate-x-12 bg-gradient-to-r from-transparent via-white/40 to-transparent opacity-0 transition-all duration-500 group-hover:translate-x-44 group-hover:opacity-100"></span>
    <span class="relative">{{ label }}</span>
</a>
{%- endmacro %}
